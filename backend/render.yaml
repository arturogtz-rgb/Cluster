services:
  - type: web
    name: cluster-turismo-backend
    runtime: python
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: turismo_jalisco
      - key: CORS_ORIGINS
        value: https://clusterturismojalisco.com.mx,https://www.clusterturismojalisco.com.mx
      - key: ADMIN_EMAIL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
